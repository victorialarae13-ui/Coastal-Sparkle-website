<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coastal Sparkle Cleaning Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #fbf9f5; }
        .serif-title { font-family: 'Playfair+Display', serif; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-between p-4 md:p-8 text-[#1e293b]">

    <header class="w-full max-w-4xl flex justify-center mb-6">
        <img src="coastal-sparkle-logo.png" alt="Coastal Sparkle Cleaning Service Logo" class="max-w-[280px] h-auto drop-shadow-sm">
    </header>

    <main class="w-full max-w-5xl bg-white rounded-3xl shadow-xl overflow-hidden border border-[#e2e8f0] p-6 md:p-12 flex flex-col md:flex-row items-center gap-8 md:gap-12 relative">
        
        <div class="flex-1 space-y-6">
            <div>
                

            <div class="grid grid-cols-2 gap-4 pt-4 border-t border-[#f1f5f9]">
                <div class="flex items-center gap-3 p-2 rounded-xl bg-[#f8fafc]">
                    <span class="text-xl">🏠</span>
                    <span class="text-xs font-semibold text-[#334155]">Locally Owned & Operated</span>
                </div>
                <div class="flex items-center gap-3 p-2 rounded-xl bg-[#f8fafc]">
                    <span class="text-xl">🛡️</span>
                    <span class="text-xs font-semibold text-[#334155]">Trustworthy & Reliable</span>
                </div>
                <div class="flex items-center gap-3 p-2 rounded-xl bg-[#f8fafc]">
                    <span class="text-xl">✨</span>
                    <span class="text-xs font-semibold text-[#334155]">Detail-Oriented & Thorough</span>
                </div>
                <div class="flex items-center gap-3 p-2 rounded-xl bg-[#f8fafc]">
                    <span class="text-xl">❤️</span>
                    <span class="text-xs font-semibold text-[#334155]">Cleaning with Care & Heart</span>
                </div>
            </div>
        </div>

        <div class="flex-1 flex justify-center w-full max-w-sm md:max-w-none">
            <div class="relative p-2 rounded-2xl bg-gradient-to-tr from-[#bae6fd] to-[#fed7aa] shadow-md">
                <img src="victoria-photo-2.webp" alt="Victoria - Coastal Sparkle" class="rounded-xl object-cover max-w-full h-auto">
            </div>
        </div>
    </main>

    <footer class="w-full max-w-3xl text-center mt-8 px-4">
        <blockquote class="serif-title text-lg md:text-xl italic text-[#475569] border-t border-b border-[#e2e8f0] py-4">
            “A clean home isn't just about how it looks — it's about how it makes you feel.” 🧡
        </blockquote>
    </footer>

</body>
</html>
